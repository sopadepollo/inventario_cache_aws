name: Build AMI and Deploy Infrastructure
on:
  push:
    branches:
      - main

join:
  bake-ami-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      # 1. Autenticación con AWS (Usando secretos guardados en GitHub)
      - name: Configurar credenciales de aws
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1

      # 2. Instalar Packer y construir la AMI
      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer Init
        run: packer init api.pkr.hcl

      - name: Construir la Golden AMI
        run: packer build api.pkr.hcl

      # 3. Instalar Terraform y aplicar los cambios (Actualizar el Auto Scaling Group)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ./infra-aws
        run: terraform init

      - name: Terraform Apply
        working-directory: ./infra-aws
        run: terraform apply -auto-approve
